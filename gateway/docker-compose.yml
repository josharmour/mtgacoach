# LiteLLM gateway stack for api.mtgacoach.com (LiteLLM proxy + Postgres for keys)
# Deploy to /volume1/docker/appdata/litellm/ on the NAS.
# Secrets come from a sibling .env (LITELLM_MASTER_KEY, POSTGRES_PASSWORD,
# AZURE_OPENAI_BASE_URL, AZURE_OPENAI_API_KEY). Start on a test port first
# (4000), verify, then point the Cloudflare tunnel here.

services:
  litellm-db:
    image: postgres:16-alpine
    container_name: litellm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    restart: unless-stopped
    depends_on:
      litellm-db:
        condition: service_healthy
    ports:
      # Cloudflare tunnel routes api.mtgacoach.com -> 10.0.0.2:8444, so publish
      # the LiteLLM proxy (container :4000) on host :8444 to take over that
      # hostname with no Cloudflare/tunnel changes.
      - "8444:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@litellm-db:5432/litellm
      AZURE_OPENAI_BASE_URL: ${AZURE_OPENAI_BASE_URL:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      # UTF-8 everywhere (the old proxy crashed on ASCII locale).
      PYTHONUTF8: "1"
      LANG: C.UTF-8
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
