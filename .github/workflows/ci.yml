name: ci

# Runs the Python test suite on every push to master and every PR.
# Platform-specific tests (Windows/macOS-only) rely on their own skip guards.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system libraries (headless Qt + audio)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon0 libdbus-1-3 libportaudio2

      - name: Install package with dev + full extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,full]"

      - name: Run tests
        run: python -m pytest tests -q
