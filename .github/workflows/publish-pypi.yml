name: publish-pypi

# Publishes arenamcp to PyPI when a GitHub Release is published, using PyPI
# Trusted Publishing (OIDC) — no API token is stored anywhere.
#
# ONE-TIME SETUP (pypi.org web UI): Account → Publishing → "Add a new
# pending publisher":
#   PyPI project name: arenamcp
#   Owner:            josharmour
#   Repository:       mtgacoach
#   Workflow name:    publish-pypi.yml
#   Environment:      pypi
# After the first successful publish the pending publisher becomes permanent.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
