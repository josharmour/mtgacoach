name: build-installer

# Builds mtgacoach-Setup.exe on a Windows runner and attaches it to the
# release for the pushed tag. This replaced the manual Windows build after
# the dev Windows machine was retired (2026-06-09) — the Linux dev box
# cannot run Inno Setup.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to attach the installer to (e.g. v2.4.0)"
        required: false
        default: ""

jobs:
  installer:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ inputs.release_tag || github.ref_name }}".TrimStart("v")
          if ($version -notmatch '^\d') { $version = (Select-String -Path pyproject.toml -Pattern '^version = "(.+)"').Matches[0].Groups[1].Value }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$version installer\mtgacoach.iss
          if (-not (Test-Path dist\installer\mtgacoach-Setup.exe)) { throw "installer not produced" }

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ inputs.release_tag }}"
          if (-not $tag) { $tag = "${{ github.ref_name }}" }
          gh release upload "$tag" dist/installer/mtgacoach-Setup.exe --clobber

      - name: Upload artifact (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') && inputs.release_tag == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: mtgacoach-Setup
          path: dist/installer/mtgacoach-Setup.exe
