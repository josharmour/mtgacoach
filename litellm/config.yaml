# LiteLLM gateway for api.mtgacoach.com
# =====================================
# One OpenAI-compatible endpoint in front of the two baremetal vLLM models.
# Friends/family get a virtual key (minted at /ui) scoped to the models they're
# allowed to use; mtgacoach itself is just another key + model. Replaces the
# hand-rolled proxy — LiteLLM handles routing, key auth, budgets, usage.

model_list:
  # --- fast coaching model (mtgacoach) ---
  - model_name: gemma-4-12b-it
    litellm_params:
      model: openai/gemma-4-12b-it
      api_base: http://10.0.0.10:8003/v1
      api_key: vllm
      # Gemma 4 is a thinking model; without this it emits reasoning tokens and
      # leaves `content` empty (the "empty advice" / empty coding-response bug).
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

  # --- bigger dense model for agentic / coding (nephew + friends) ---
  - model_name: gemma-4-31b-it
    litellm_params:
      model: openai/gemma-4-31b-it
      api_base: http://10.0.0.10:8002/v1
      api_key: vllm
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

litellm_settings:
  # Silently drop params a given model doesn't support instead of erroring.
  drop_params: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
