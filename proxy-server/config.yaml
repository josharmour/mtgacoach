# mtgacoach.com Proxy Server Configuration
# ==========================================

# Server settings
server:
  host: "0.0.0.0"
  port: 8443

# Provider routing: requests are tried in order of priority (lowest first).
# The proxy picks the first available provider and forwards the request.
providers:
  # Azure gpt-5.4 is disabled so that "online" routes to the home-lab gemma
  # below (online == local for this deployment). With azure off, a client
  # request for "gpt-5.4" matches no provider's model list and falls back to
  # the highest-priority available provider (gemma-12b), whose forward path
  # rewrites the model name to "gemma-4-12b-it". Re-enable azure (and demote
  # gemma) to restore the cloud model as primary.
  - name: azure-openai
    priority: 100
    base_url: "${AZURE_OPENAI_BASE_URL}"
    api_key: "${AZURE_OPENAI_API_KEY}"
    api_version: "2024-05-01-preview"
    models:
      - "gpt-5.4"
    enabled: false

  - name: local-vllm
    priority: 10
    # Home-lab vLLM on RTX PRO 6000 Blackwell (96 GB). Serves the TrevorJS
    # abliterated Gemma 4 31B (bf16) with MTP speculative decoding via
    # google/gemma-4-31B-it-assistant as drafter. Both the bare name and the
    # :latest alias resolve here so clients that mix Ollama-style tags and
    # vLLM-style names route the same way.
    base_url: "http://10.0.0.10:8001/v1"
    # vLLM accepts any non-empty bearer; literal keeps the provider always
    # "enabled" without needing an env var on the NAS.
    api_key: "vllm"
    models:
      - "nvidia/MiniMax-M2.7-NVFP4"
    enabled: true

  - name: local-vllm-gemma-12b
    priority: 0
    # Home-lab vLLM serving the faster Gemma 4 12B-it on port 8003 (the fast
    # one; 8002 serves the 31B). Primary provider for online mode.
    base_url: "http://10.0.0.10:8003/v1"
    api_key: "vllm"
    models:
      - "gemma-4-12b-it"
    enabled: true

# Default model when client doesn't specify (or sends model="" / "default").
# The /v1/chat/completions handler substitutes this in when no model is given.
default_model: "gemma-4-12b-it"

# Admin credentials for the management dashboard
admin:
  username: "admin"
  # Change this! Use: python3 -c "import secrets; print(secrets.token_urlsafe(32))"
  password: "${ADMIN_PASSWORD}"

# Database
database:
  path: "./data/mtgacoach.db"
