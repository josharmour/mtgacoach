version: "3.8"

services:
  proxy:
    build: .
    ports:
      - "8443:8443"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8443/health"]
      interval: 30s
      timeout: 5s
      retries: 3
